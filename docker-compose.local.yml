services:
  ai-presentation:
    container_name: ai-presentation-local
    build: .
    ports:
      - "4561:80"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - ENABLE_ADMIN_API=true
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
    volumes:
      - ./runtime-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
