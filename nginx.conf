server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Optional CSP note:
  # A strict Content-Security-Policy is intentionally not enabled here because
  # the presentation supports local media, SVG assets, data URLs from the media
  # manager, and browser-stored logos. Add a CSP only after testing those flows.

  autoindex off;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files /index.html =404;
  }

  location ~ /\.(?!well-known) {
    deny all;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|mp4|webm|woff2?)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location /config/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
