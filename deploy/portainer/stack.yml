services:
  ai-presentation:
    image: ghcr.io/hamzajwan/ai-presentation:${IMAGE_TAG:-latest}
    container_name: ai-presentation
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4561}:80"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - ENABLE_ADMIN_API=${ENABLE_ADMIN_API:-true}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-change-me}
    volumes:
      - /opt/Appdata/ai_presentation/appdata:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=${WATCHTOWER_ENABLE:-false}"
